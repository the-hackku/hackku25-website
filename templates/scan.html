<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan User</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
      }

      h1 {
        margin-bottom: 20px;
      }

      #event-selection-form {
        margin-bottom: 20px;
      }

      #reader {
        width: 80%;
        max-width: 400px;
        height: 400px;
        border: 1px solid #ccc;
      }

      #feedback {
        display: none;
        padding: 10px;
        margin-top: 20px;
        border-radius: 5px;
        text-align: center;
        font-weight: bold;
      }

      #feedback.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      #feedback.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      #history {
        margin-top: 20px;
        width: 80%;
        max-width: 400px;
        border-collapse: collapse;
      }

      #history th,
      #history td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
      }

      audio {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Scan User</h1>
    <form id="event-selection-form">
      <label for="event_id">Select Event:</label>
      <select id="event_id" name="event_id" required>
        {% for event in events %}
        <option value="{{ event.id }}">{{ event.name }}</option>
        {% endfor %}
      </select>
    </form>
    <div id="reader"></div>
    <div id="feedback"></div>
    <audio
      id="success-sound"
      src="{{ url_for('static', filename='success.mp3') }}"
      preload="auto"
    ></audio>
    <audio
      id="error-sound"
      src="{{ url_for('static', filename='error.mp3') }}"
      preload="auto"
    ></audio>
    <table id="history">
      <thead>
        <tr>
          <th>User</th>
          <th>Timestamp</th>
          <th>Event</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script>
      let isScanning = true;

      document.addEventListener("DOMContentLoaded", (event) => {
        fetchHistory();
      });

      document
        .getElementById("event_id")
        .addEventListener("change", function () {
          fetchHistory();
        });

      function fetchHistory() {
        fetch(`/admin/scanner_history`)
          .then((response) => response.json())
          .then((data) => {
            const history = document
              .getElementById("history")
              .getElementsByTagName("tbody")[0];
            history.innerHTML = ""; // Clear existing history
            data.forEach((item) => {
              let newRow = history.insertRow();
              newRow.innerHTML = `<td>${item.username}</td><td>${item.timestamp}</td><td>${item.event_name}</td>`;
            });
          })
          .catch((error) => console.error("Error:", error));
      }

      function onScanSuccess(decodedText, decodedResult) {
        if (!isScanning) return;
        let userId = decodedText;
        let eventId = document.getElementById("event_id").value;

        fetch("{{ url_for('admin.scan') }}", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ user_id: userId, event_id: eventId }),
        })
          .then((response) => response.json())
          .then((data) => {
            const feedback = document.getElementById("feedback");
            const history = document
              .getElementById("history")
              .getElementsByTagName("tbody")[0];
            let newRow = history.insertRow();

            if (data.success) {
              document.getElementById("success-sound").play();
              feedback.textContent = `User ${data.user_name} scanned successfully!`;
              feedback.className = "success";

              newRow.innerHTML = `<td>${
                data.user_name
              }</td><td>${new Date().toLocaleString()}</td><td>${
                document.getElementById("event_id").selectedOptions[0].text
              }</td>`;
            } else {
              document.getElementById("error-sound").play();
              feedback.textContent = `Failed to scan user ${
                data.user_name || ""
              }`;
              feedback.className = "error";

              newRow.innerHTML = `<td>${
                data.user_name || "Unknown"
              }</td><td>${new Date().toLocaleString()}</td><td>${
                document.getElementById("event_id").selectedOptions[0].text
              }</td>`;
            }
            feedback.style.display = "block";
            setTimeout(() => {
              feedback.style.display = "none";
            }, 3000);

            isScanning = false;
            setTimeout(() => {
              isScanning = true;
            }, 2000);
          })
          .catch((error) => console.error("Error:", error));
      }

      function onScanFailure(error) {
        console.warn(`Code scan error = ${error}`);
      }

      let html5QrcodeScanner = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: 250,
      });
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
  </body>
</html>
