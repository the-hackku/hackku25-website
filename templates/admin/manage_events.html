{% extends "base.html" %} {% block title %}Manage Events{% endblock %} {% block
content %}
<h1>Manage Events</h1>
<h2>Create Event</h2>
<form method="post" action="{{ url_for('admin.create_event') }}">
  <label for="name">Event Name</label>
  <input type="text" id="name" name="name" required />
  <button type="submit">Create Event</button>
</form>

<h2>Existing Events</h2>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for event in events %}
    <tr>
      <td>{{ event.id }}</td>
      <td>{{ event.name }}</td>
      <td>
        <form
          method="post"
          action="{{ url_for('admin.delete_event', event_id=event.id) }}"
          style="display: inline"
        >
          <button type="submit">Delete</button>
        </form>
        <a href="{{ url_for('admin.event_stats', event_id=event.id) }}">
          <button type="button">View Check-Ins</button>
        </a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
