{% extends "base.html" %} {% block title %}Manage Users{% endblock %} {% block
content %}
<h1>Manage Users</h1>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Email</th>
      <th>Role</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
    <tr>
      <td>{{ user.id }}</td>
      <td>{{ user.username }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.role }}</td>
      <td>
        <form
          method="post"
          action="{{ url_for('admin.delete_user', user_id=user.id) }}"
          style="display: inline"
        >
          <button type="submit">Delete</button>
        </form>
        <a href="{{ url_for('admin.edit_user', user_id=user.id) }}">
          <button type="button">Edit</button>
        </a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
